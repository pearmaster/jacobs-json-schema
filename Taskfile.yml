version: '3'

tasks:
  ruff:
    desc: Run ruff linter
    cmd: uv run ruff check .

  black:
    desc: Run black formatter check
    cmd: uv run black --check --target-version py37 .

  mypy:
    desc: Run mypy type checker
    cmd: uv run mypy .

  test:
    desc: Run all tests
    cmd: uv run pytest

  test:draft4:
    desc: Run draft 4 integrated test suite
    cmd: uv run pytest tests/integrated/test_suite_4_docs.py

  test:draft6:
    desc: Run draft 6 integrated test suite
    cmd: uv run pytest tests/integrated/test_suite_6_docs.py

  test:draft7:
    desc: Run draft 7 integrated test suite
    cmd: uv run pytest tests/integrated/test_suite_7_docs.py

  all:
    desc: Run all checks and tests
    cmds:
      - task: ruff
      - task: black
      - task: mypy
      - task: test
